<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>ULTIMATE CYBER HUB</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New'; padding: 20px; }
        .panel { border: 2px solid #0f0; padding: 20px; box-shadow: 0 0 15px #0f0; max-width: 800px; margin: auto; }
        input { background: #111; color: #0f0; border: 1px solid #0f0; padding: 10px; width: 70%; margin-bottom: 10px; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin: 5px; }
        button:hover { background: #0a0; }
        .output { background: #111; padding: 15px; border: 1px dashed #0f0; margin-top: 20px; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>[ TERMINAL v3.0 - PRIVATE ]</h1>
        <input type="text" id="target" placeholder="https://example.com">
        <br>
        <button onclick="runTool('stress_test')">WEBSITE CRASHER (2 MIN)</button>
        <button onclick="runTool('check_status')">CHECK STATUS</button>
        <button onclick="runTool('admin_finder')">ADMIN FINDER</button>
        
        <div class="output" id="log">System Ready... Waiting for target.</div>
    </div>

    <script>
        function runTool(action) {
            let target = document.getElementById('target').value;
            if(!target) return alert("Target URL দিন!");
            
            document.getElementById('log').innerText = "Processing... Please wait.";
            
            fetch('/tools', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: action, target: target})
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('log').innerText = "Result: " + data.status;
            });
        }
    </script>
</body>
          </html>
